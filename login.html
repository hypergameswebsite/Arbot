<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbot - Log In</title>
</head>
<body style="background-color: black;"> 
    <h1 style="color: darkgreen;">Log In to Arbot</h1>
    <form action="/login" method="post">
        <label for="username" style="color: darkgreen;">Username:</label><br>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password" style="color: darkgreen;">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>
        <button type="submit" style="background-color: darkgreen; color: black; border-color: darkolivegreen; border-radius: 5px; size: 20px;">Log In</button>
    </form>
    <button style="background-color: darkgreen; color: black; border-color: darkolivegreen; border-radius: 5px; size: 20px;" onclick="window.location.href='index.html'">Back to Home</button>
</body>
