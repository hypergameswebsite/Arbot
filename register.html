<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbot - Register</title>
</head>
<body style="background-color: black;">
    <h1 style="color: darkgreen;">Register to Arbot</h1>
    <form action="/register" method="post">
        <label for="username" style="color: darkgreen;">Username:</label><br>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password" style="color: darkgreen;">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>
        <label for="confirm_password" style="color: darkgreen;">Confirm Password:</label><br>
        <input type="password" id="confirm_password" name="confirm_password" required><br><br>
        <label for="number" style="color: darkgreen;">Positives:</label><br>
        <input type="number" id="number" name="number" required><br><br>
        <label for="number" style="color: darkgreen;">Negatives:</label><br>
        <input type="number" id="number" name="number" required><br><br>
        <label for="number" style="color: darkgreen;">House Points:</label><br>
        <input type="number" id="number" name="number" required><br><br>
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms" style="color: darkgreen;">I agree to the terms and conditions</label><br><br>
        <button type="submit" style="background-color: darkgreen; color: black; border-color: darkolivegreen; border-radius: 5px;">Register</button>
    </form>
</body>
